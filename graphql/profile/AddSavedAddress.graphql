mutation AddSavedAddress($input: SavedAddressInput!, $jwt: String!) {
  addSavedAddress(input: $input, jwt: $jwt) {
    id
    savedAddresses {
      id
      label
      street
      city
      reference
      addressType
      buildingName
      floor
      apartment
      deliveryInstructions
      latitude
      longitude
    }
    defaultAddressId
  }
}
