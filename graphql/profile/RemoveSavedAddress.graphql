mutation RemoveSavedAddress($addressId: String!, $jwt: String!) {
  removeSavedAddress(addressId: $addressId, jwt: $jwt) {
    id
    savedAddresses {
      id
      label
      street
      city
      reference
      addressType
      buildingName
      floor
      apartment
      deliveryInstructions
      latitude
      longitude
    }
    defaultAddressId
  }
}
