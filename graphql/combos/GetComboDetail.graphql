query GetComboDetail($comboId: String!) {
  combo(comboId: $comboId) {
    id
    branchId
    name
    description
    imageUrl
    currency
    availability
    discountType
    discountValue
    finalPrice
    savings
    startingFinalPrice
    startingSavings
    representativeProducts {
      id
      name
      imageUrl
    }
    slots {
      id
      name
      description
      minSelections
      maxSelections
      isFree
      displayOrder
      options {
        productId
        isDefault
        priceAdjustment
        product {
          id
          name
          imageUrl
          price
          currency
        }
        availableModifiers {
          name
          priceAdjustment
        }
      }
    }
    giftOptions {
      productId
      product {
        id
        name
        imageUrl
      }
    }
    branch {
      id
      name
      avatarUrl
    }
    createdAt
  }
}
