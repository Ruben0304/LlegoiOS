query SearchBoth(
  $query: String!
  $firstProducts: Int! = 10
  $firstBranches: Int! = 8
  $useVectorSearch: Boolean
  $jwt: String
) {
  searchProducts(
    query: $query
    first: $firstProducts
    useVectorSearch: $useVectorSearch
    jwt: $jwt
  ) {
    edges {
      node {
        id
        name
        price
        currency
        imageUrlBaja
        business {
          id
          name
          avatarUrl
        }
      }
    }
  }
  searchBranches(
    query: $query
    first: $firstBranches
    useVectorSearch: $useVectorSearch
    jwt: $jwt
  ) {
    edges {
      node {
        id
        name
        avatarUrl
        coverUrl
        address
        coordinates {
          type
          coordinates
        }
        deliveryRadius
        products(limit: 4, availableOnly: false) {
          id
          name
          price
          currency
          imageUrlBaja
          availability
        }
      }
    }
  }
}
