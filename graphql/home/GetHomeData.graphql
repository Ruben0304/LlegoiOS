query GetHomeData {
  products {
    id
    branchId
    name
    price
    currency
    imageUrl
    availability
    createdAt
    business {
      id
      name
    }
  }
  branches {
    id
    businessId
    name
    address
    coordinates {
      type
      coordinates
    }
    phone
    status
    avatarUrl
    coverUrl
    deliveryRadius
    createdAt
  }
}
