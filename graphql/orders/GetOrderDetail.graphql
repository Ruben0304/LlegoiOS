query GetOrderDetail($id: String!, $jwt: String!) {
    order(id: $id, jwt: $jwt) {
        id
        orderNumber
        status
        customerVisibleStatus
        deadlineAt
        deliveryVerificationCode
        subtotal
        deliveryFee
        total
        currency
        paymentMethod
        paymentStatus
        deliveryMode
        createdAt
        updatedAt
        lastStatusAt
        isEditable
        canCancel
        estimatedDeliveryTime
        estimatedMinutesRemaining
        items {
            itemType
            itemId
            productId
            name
            basePrice
            finalPrice
            price
            quantity
            imageUrlMuyBaja
            imageUrl
            wasModifiedByStore
            lineTotal
            discountType
            discountValue
            comboSelections {
                slotId
                slotName
                selectedOptions {
                    productId
                    name
                    price
                    quantity
                    priceAdjustment
                    modifiers {
                        name
                        priceAdjustment
                    }
                }
            }
        }
        discounts {
            id
            title
            amount
            type
        }
        deliveryAddress {
            street
            city
            reference
            addressType
            buildingName
            floor
            apartment
            deliveryInstructions
            coordinates {
                type
                coordinates
            }
        }
        pickupAddress {
            street
        }
        deliveryPerson {
            id
            name
            phone
            rating
            vehicleType
            vehiclePlate
            profileImageUrl
            isOnline
        }
        timeline {
            status
            timestamp
            message
            actor
        }
        comments {
            id
            author
            message
            timestamp
        }
        branch {
            id
            name
            address
            phone
            avatarUrl
            accounts {
                cardNumber
                cardHolderName
                bankName
                isActive
            }
            phones {
                phone
                isActive
            }
            coordinates {
                type
                coordinates
            }
        }
        business {
            id
            name
            avatarUrl
        }
    }
}
