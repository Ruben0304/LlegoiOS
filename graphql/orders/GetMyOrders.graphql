query GetMyOrders($status: OrderStatusEnum, $limit: Int, $offset: Int, $jwt: String!) {
  myOrders(status: $status, limit: $limit, offset: $offset, jwt: $jwt) {
    orders {
      id
      orderNumber
      status
      total
      currency
      paymentStatus
      createdAt
      lastStatusAt
      estimatedMinutesRemaining
      items {
        productId
        name
        quantity
        imageUrlMuyBaja
        imageUrl
      }
      branch {
        id
        name
        avatarUrl
      }
      business {
        id
        name
      }
    }
    totalCount
    hasMore
  }
}
