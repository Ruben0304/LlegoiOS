mutation AcceptOrderModifications($orderId: String!, $jwt: String!) {
  acceptOrderModifications(orderId: $orderId, jwt: $jwt) {
    id
    orderNumber
    status
    subtotal
    total
    lastStatusAt
    items {
      itemType
      itemId
      productId
      name
      basePrice
      finalPrice
      price
      quantity
      imageUrl
      wasModifiedByStore
      lineTotal
      discountType
      discountValue
      comboSelections {
        slotId
        slotName
        selectedOptions {
          productId
          name
          price
          quantity
          priceAdjustment
          modifiers {
            name
            priceAdjustment
          }
        }
      }
    }
    timeline {
      status
      timestamp
      message
      actor
    }
  }
}
