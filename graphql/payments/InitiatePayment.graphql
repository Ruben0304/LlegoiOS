mutation InitiatePayment(
  $orderId: String!
  $paymentMethodId: String!
  $jwt: String!
  $includeDeliveryFee: Boolean!
  $sendsSmsNotification: Boolean!
) {
  initiatePayment(
    orderId: $orderId
    paymentMethodId: $paymentMethodId
    jwt: $jwt
    includeDeliveryFee: $includeDeliveryFee
    sendsSmsNotification: $sendsSmsNotification
  ) {
    paymentAttempt {
      id
      orderId
      paymentMethodId
      subtotal
      deliveryFee
      includesDeliveryFee
      taxAmount
      discountAmount
      commissionAmount
      totalAmount
      currency
      status
      stripePaymentIntentId
      stripeClientSecret
      sendsSmsNotification
      proofUrl
      customerConfirmedAt
      businessConfirmedAt
      disputeReason
      deliveryPersonConfirmedAt
      deliveryPersonId
      walletTransactionId
      businessWalletTransactionId
      commissionTransactionId
    }
    instructions
  }
}
