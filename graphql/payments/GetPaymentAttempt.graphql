query GetPaymentAttempt($id: String!, $jwt: String!) {
  paymentAttempt(id: $id, jwt: $jwt) {
    id
    orderId
    paymentMethodId
    subtotal
    deliveryFee
    includesDeliveryFee
    taxAmount
    discountAmount
    commissionAmount
    totalAmount
    currency
    status
    stripePaymentIntentId
    stripeClientSecret
    proofUrl
    customerConfirmedAt
    businessConfirmedAt
    disputeReason
    deliveryPersonConfirmedAt
    deliveryPersonId
    walletTransactionId
    businessWalletTransactionId
    commissionTransactionId
  }
}
