mutation ConfirmTransferByShortcut(
  $paymentAttemptId: String!
  $jwt: String!
  $transferId: String
) {
  confirmTransferByShortcut(
    paymentAttemptId: $paymentAttemptId
    jwt: $jwt
    transferId: $transferId
  ) {
    id
    orderId
    paymentMethodId
    subtotal
    deliveryFee
    includesDeliveryFee
    taxAmount
    discountAmount
    commissionAmount
    totalAmount
    currency
    status
    sendsSmsNotification
    proofUrl
    customerConfirmedAt
    businessConfirmedAt
    disputeReason
    deliveryPersonConfirmedAt
    deliveryPersonId
    walletTransactionId
    businessWalletTransactionId
    commissionTransactionId
  }
}
