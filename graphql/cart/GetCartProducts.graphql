query GetCartProducts($first: Int! = 100, $after: String, $ids: [String!]!) {
  products(first: $first, after: $after, ids: $ids) {
    edges {
      node {
        id
        branchId
        name
        description
        weight
        price
        currency
        imageUrl
        availability
        createdAt
        business {
          id
          name
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
