query GetBranches($businessId: String, $tipo: BranchTipo, $radiusKm: Float, $jwt: String) {
  branches(businessId: $businessId, tipo: $tipo, radiusKm: $radiusKm, jwt: $jwt) {
    id
    businessId
    name
    address
    coordinates {
      type
      coordinates
    }
    phone
    status
    avatarUrl
    coverUrl
    deliveryRadius
    createdAt
    score
    distanceKm
  }
}
