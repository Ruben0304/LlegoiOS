query GetBranches($first: Int! = 20, $after: String, $businessId: String, $tipo: BranchTipo, $radiusKm: Float, $productCategoryId: String, $jwt: String, $productsLimit: Int = 2) {
  branches(first: $first, after: $after, businessId: $businessId, tipo: $tipo, radiusKm: $radiusKm, productCategoryId: $productCategoryId, jwt: $jwt) {
    edges {
      node {
        id
        businessId
        name
        address
        coordinates {
          type
          coordinates
        }
        phone
        status
        avatarUrl
        coverUrl
        deliveryRadius
        createdAt
        score
        distanceKm
        products(limit: $productsLimit, availableOnly: false) {
          id
          name
          price
          currency
          imageUrl
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
