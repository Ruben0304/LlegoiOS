query GetBranches($businessId: String) {
  branches(businessId: $businessId) {
    id
    businessId
    name
    address
    coordinates {
      type
      coordinates
    }
    phone
    schedule
    managerIds
    status
    avatar
    coverImage
    avatarUrl
    coverUrl
    deliveryRadius
    facilities
    createdAt
  }
}
