query SearchBranches($query: String!, $limit: Int, $useVectorSearch: Boolean) {
  searchBranches(query: $query, limit: $limit, useVectorSearch: $useVectorSearch) {
    id
    businessId
    name
    address
    coordinates {
      type
      coordinates
    }
    phone
    status
    avatarUrl
    coverUrl
    deliveryRadius
    createdAt
  }
}
