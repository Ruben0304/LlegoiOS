query SearchBranches($query: String!, $first: Int! = 20, $after: String, $useVectorSearch: Boolean, $productCategoryId: String, $radiusKm: Float, $jwt: String) {
  searchBranches(query: $query, first: $first, after: $after, useVectorSearch: $useVectorSearch, productCategoryId: $productCategoryId, radiusKm: $radiusKm, jwt: $jwt) {
    edges {
      node {
        id
        businessId
        name
        acceptsQvapay
        acceptsZelle
        qvapayUsername
        zelleEmail
        address
        coordinates {
          type
          coordinates
        }
        phone
        status
        avatarUrl
        avatarUrlBaja
        avatarUrlAlta
        coverUrl
        coverUrlBaja
        coverUrlAlta
        deliveryRadius
        createdAt
        score
        distanceKm
        products(limit: 4, availableOnly: false) {
          id
          name
          price
          currency
          imageUrlBaja
          availability
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
