query SearchBranches($query: String!, $limit: Int, $useVectorSearch: Boolean, $radiusKm: Float, $jwt: String) {
  searchBranches(query: $query, limit: $limit, useVectorSearch: $useVectorSearch, radiusKm: $radiusKm, jwt: $jwt) {
    id
    businessId
    name
    address
    coordinates {
      type
      coordinates
    }
    phone
    status
    avatarUrl
    coverUrl
    deliveryRadius
    createdAt
    score
    distanceKm
  }
}
