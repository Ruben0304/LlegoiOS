query GetBranchDetail($id: String!) {
    branch(id: $id) {
        id
        businessId
        name
        acceptsQvapay
        acceptsZelle
        qvapayUsername
        zelleEmail
        address
        coordinates {
            type
            coordinates
        }
        phone
        status
        avatarUrl
        avatarUrlBaja
        avatarUrlAlta
        coverUrl
        coverUrlBaja
        coverUrlAlta
        deliveryRadius
        acceptedCurrency
        exchangeRate
        schedule
        createdAt
        showcases(activeOnly: true) {
            id
            title
            description
            imageUrl
            isActive
            createdAt
            items {
                id
                name
                description
                price
                availability
            }
        }
    }
}
