query GetProductDetail($id: String!, $jwt: String) {
    product(id: $id, jwt: $jwt) {
        id
        branchId
        name
        description
        weight
        price
        currency
        convertedPrice
        convertedCurrency
        exchangeRate
        imageUrlAlta
        availability
        categoryId
        variantListIds
        variantLists {
            id
            name
            description
            options {
                id
                name
                priceAdjustment
            }
        }
        createdAt
        branch {
            id
            name
            avatarUrl
        }
        business {
            id
            name
            avatarUrl
        }
    }
}
