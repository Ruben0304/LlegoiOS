query GetProductDetail($id: String!) {
  product(id: $id) {
    id
    branchId
    name
    description
    weight
    price
    currency
    imageUrl
    availability
    categoryId
    createdAt
    branch {
      id
      name
      avatarUrl
    }
    business {
      id
      name
      avatarUrl
    }
  }
}
