query SearchProducts($query: String!, $first: Int! = 20, $after: String, $useVectorSearch: Boolean, $branchTipo: BranchTipo, $categoryId: String, $radiusKm: Float, $jwt: String) {
  searchProducts(query: $query, first: $first, after: $after, useVectorSearch: $useVectorSearch, branchTipo: $branchTipo, categoryId: $categoryId, radiusKm: $radiusKm, jwt: $jwt) {
    edges {
      node {
        id
        branchId
        name
        description
        weight
        price
        currency
        imageUrlBaja
        availability
        createdAt
        distanceKm
        score
        categoryId
        category {
          id
          branchType
          name
          iconIos
          iconWeb
          iconAndroid
        }
        business {
          id
          name
          avatarUrl
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
