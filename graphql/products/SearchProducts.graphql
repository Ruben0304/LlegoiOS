query SearchProducts($query: String!, $limit: Int, $useVectorSearch: Boolean, $radiusKm: Float, $jwt: String) {
  searchProducts(query: $query, limit: $limit, useVectorSearch: $useVectorSearch, radiusKm: $radiusKm, jwt: $jwt) {
    id
    branchId
    name
    description
    weight
    price
    currency
    imageUrl
    availability
    createdAt
    distanceKm
    score
    business {
      id
      name
    }
  }
}
