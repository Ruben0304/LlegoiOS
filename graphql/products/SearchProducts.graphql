query SearchProducts($query: String!, $limit: Int, $useVectorSearch: Boolean) {
  searchProducts(query: $query, limit: $limit, useVectorSearch: $useVectorSearch) {
    id
    branchId
    name
    description
    weight
    price
    currency
    imageUrl
    availability
    createdAt
    business {
      id
      name
    }
  }
}
