query GetProducts($branchId: String, $categoryId: String, $availableOnly: Boolean) {
  products(branchId: $branchId, categoryId: $categoryId, availableOnly: $availableOnly) {
    id
    branchId
    name
    price
    currency
    imageUrl
    availability
    createdAt
    business {
      id
      name
    }
  }
}
