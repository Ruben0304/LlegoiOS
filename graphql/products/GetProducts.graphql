query GetProducts($branchId: String, $categoryId: String, $availableOnly: Boolean, $branchTipo: BranchTipo, $radiusKm: Float, $jwt: String) {
  products(branchId: $branchId, categoryId: $categoryId, availableOnly: $availableOnly, branchTipo: $branchTipo, radiusKm: $radiusKm, jwt: $jwt) {
    id
    branchId
    name
    price
    currency
    imageUrl
    availability
    createdAt
    distanceKm
    score
    business {
      id
      name
    }
  }
}
