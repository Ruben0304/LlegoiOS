query GetProducts($first: Int! = 20, $after: String, $branchId: String, $categoryId: String, $availableOnly: Boolean, $branchTipo: BranchTipo, $radiusKm: Float, $jwt: String) {
  products(first: $first, after: $after, branchId: $branchId, categoryId: $categoryId, availableOnly: $availableOnly, branchTipo: $branchTipo, radiusKm: $radiusKm, jwt: $jwt) {
    edges {
      node {
        id
        branchId
        name
        price
        currency
        imageUrlBaja
        availability
        createdAt
        distanceKm
        score
        categoryId
        categoryName
        category {
          id
          branchType
          name
          iconIos
          iconWeb
          iconAndroid
        }
        business {
          id
          name
          avatarUrl
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}

query GetProductCategories($branchType: String) {
  productCategories(branchType: $branchType) {
    id
    branchType
    name
    iconIos
    iconWeb
    iconAndroid
    createdAt
  }
}
