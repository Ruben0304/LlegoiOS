) {
  products(
    first: $first
    after: $after
    branchId: $branchId
    categoryId: $categoryId
    availableOnly: $availableOnly
    radiusKm: $radiusKm
    jwt: $jwt
  ) {
    edges {
      node {
        id
        branchId
        name
        price
        currency
        imageUrlBaja
        availability
        createdAt
        distanceKm
        score
        categoryId
        categoryName
        category {
          id
          branchType
          name
          iconIos
          iconWeb
          iconAndroid
        }
        business {
          id
          name
          avatarUrl
          avatarUrlBaja
          avatarUrlAlta
        }
