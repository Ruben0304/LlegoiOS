query GetCompleteFeed(
  $jwt: String
  $first: Int
  $sections: [String!]
  $branchType: String
  $branchTipo: BranchTipo
  $radiusKm: Float
  $categoryId: String
) {
  # 1. Feed sections (personalized feed)
  getFeed(jwt: $jwt, first: $first, sections: $sections) {
    sections {
      sectionId
      title
      description
      totalCount
      products {
        id
        name
        price
        currency
        imageUrl
        branchId
        branch {
          name
          address
          tipos
        }
        categoryName
        availability
        score
        description
      }
    }
    sectionDiagnostics {
      sectionId
      title
      status
      reason
      totalBeforeDedup
      totalAfterDedup
    }
    timestamp
  }

  # 2. Categories for filter chips
  productCategories(branchType: $branchType) {
    id
    name
    iconIos
  }

  # 3. Stores for "Lo mejor de Llego" section
  branches(
    first: 15
    tipo: $branchTipo
    radiusKm: $radiusKm
    productCategoryId: $categoryId
  ) {
    edges {
      node {
        id
        businessId
        name
        avatarUrl
        coverUrl
        address
        distanceKm
      }
    }
  }

  # 4. Active tutorials for client app
  activeTutorials {
    id
    title
    description
    videoUrl
    videoUrlSigned
    duration
    appTarget
    thumbnailUrl
    thumbnailUrlSigned
    order
    tags
  }
}
